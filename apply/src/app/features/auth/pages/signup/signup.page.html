<!-- src/app/pages/auth/signup/signup.page.html -->
<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login" text="Retour"></ion-back-button>
    </ion-buttons>
    <ion-title>Créer un compte</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding signup-page-content">
  <div class="signup-form-container">
    <div class="signup-header ion-text-center">
      <!-- Optional: Logo can be added here if desired, similar to login -->
      <!-- <div class="logo-container"><div class="logo-icon-large">A</div></div> -->
      <h2>Créez votre copilote de carrière</h2>
      <p>Rejoignez Apply pour automatiser votre recherche d'emploi.</p>
    </div>

    <!-- Message Area for errors/success -->
    <div class="message-area" *ngIf="successMessage || errorMessage">
      <div class="success-message" *ngIf="successMessage">
        <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
        {{ successMessage }} (Redirection en cours...)
      </div>
      <div class="error-message" *ngIf="errorMessage && !successMessage">
        <ion-icon name="alert-circle-outline" slot="start"></ion-icon>
        {{ errorMessage }}
      </div>
    </div>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" *ngIf="!successMessage && signupForm">
      <app-styled-input
        label="Nom complet"
        formControlName="displayName"
        type="text"
        placeholder="Ex: Jeanne Dupont"
        [errorText]="getErrorMessage('displayName')">
      </app-styled-input>

      <app-styled-input
        label="Adresse email"
        formControlName="email"
        type="email"
        placeholder="jeanne.dupont@email.com"
        [errorText]="getErrorMessage('email')">
      </app-styled-input>

      <app-styled-input
        label="Mot de passe"
        formControlName="password"
        type="password"
        placeholder="Minimum 6 caractères"
        [errorText]="getErrorMessage('password')">
      </app-styled-input>

      <app-styled-input
        label="Confirmer le mot de passe"
        formControlName="confirmPassword"
        type="password"
        placeholder="Retapez votre mot de passe"
        [errorText]="getErrorMessage('confirmPassword')">
      </app-styled-input>
      
      <app-styled-button class="ion-margin-top" type="submit" expand="block" [disabled]="!signupForm.valid || isLoading">
        <ion-spinner *ngIf="isLoading" name="dots" slot="start"></ion-spinner>
        {{ isLoading ? 'Création en cours...' : 'S\'inscrire gratuitement' }}
      </app-styled-button>
    </form>
    
    <div class="login-link-container ion-text-center ion-margin-top" *ngIf="!successMessage">
      <p>Déjà un compte ?</p>
      <app-styled-button routerLink="/login" fill="clear" [disabled]="isLoading">
        Se connecter
      </app-styled-button>
    </div>
  </div>
</ion-content>
